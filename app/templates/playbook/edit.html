{% extends "base.html" %}

{% block title %}Edit Playbook Setup - {{ app_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h1 class="h4 mb-1">Edit setup</h1>
            <div class="text-muted small">{{ setup.name }}</div>
        </div>
        <a class="btn btn-outline-secondary" href="{{ url_for('playbook.view', setup_id=setup.id) }}">Back</a>
    </div>

    <div class="card tv-surface">
        <div class="card-body">
            <form method="POST" action="{{ url_for('playbook.edit', setup_id=setup.id) }}" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                {% include "playbook/_form.html" %}
                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a class="btn btn-secondary" href="{{ url_for('playbook.view', setup_id=setup.id) }}">Cancel</a>
                    <button class="btn btn-primary" type="submit"><i class="fas fa-save"></i> Save changes</button>
                </div>
            </form>

            <hr class="my-4">

            <form method="POST" action="{{ url_for('playbook.delete', setup_id=setup.id) }}" onsubmit="return confirm('Delete this setup? Linked trades will keep their history but lose this link.');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="btn btn-outline-danger" type="submit"><i class="fas fa-trash"></i> Delete setup</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
