<div class="row g-3">
    <div class="col-12">
        <div class="alert alert-secondary small mb-0">
            <strong>Structure:</strong> Name the setup → market/symbol/timeframe → entry (objective) → invalidation → management → checklist.
            Tag concepts like <code>fvg</code>, <code>sweep</code>, <code>bos</code> so Strategy Lab can match your journal.
        </div>
    </div>
    <div class="col-12">
        <label class="form-label">Name *</label>
        <input class="form-control" name="name" required value="{{ (setup.name if setup else '')|e }}" placeholder="Example: London Open pullback (A+)">
    </div>
    <div class="col-12 col-md-4">
        <label class="form-label">Market</label>
        <input class="form-control" name="market" value="{{ (setup.market if setup else '')|e }}" placeholder="Forex / Indices / Crypto / Metals">
    </div>
    <div class="col-12 col-md-4">
        <label class="form-label">Symbol (optional)</label>
        <input class="form-control" name="symbol_hint" value="{{ (setup.symbol_hint if setup else '')|e }}" placeholder="XAUUSD">
    </div>
    <div class="col-12 col-md-4">
        <label class="form-label">Timeframe</label>
        <input class="form-control" name="timeframe" value="{{ (setup.timeframe if setup else '')|e }}" placeholder="15M / 1H">
    </div>

    <div class="col-12">
        <label class="form-label">Entry criteria</label>
        <textarea class="form-control" name="entry_criteria" rows="4" placeholder="What must be true to enter? Keep it objective (sweep → displacement/FVG → retest).">{{ (setup.entry_criteria if setup else '')|e }}</textarea>
    </div>
    <div class="col-12">
        <label class="form-label">Invalidation (where you are wrong)</label>
        <textarea class="form-control" name="invalidation" rows="3" placeholder="Example: Break + close beyond the swept extreme; no retest within X candles.">{{ (setup.invalidation if setup else '')|e }}</textarea>
    </div>
    <div class="col-12">
        <label class="form-label">Management plan</label>
        <textarea class="form-control" name="management_plan" rows="3" placeholder="Example: 50% at 1R, BE after 1R, trail under swings.">{{ (setup.management_plan if setup else '')|e }}</textarea>
    </div>

    <div class="col-12">
        <label class="form-label">Checklist (one per line)</label>
        <textarea class="form-control" name="checklist_text" rows="6" placeholder="HTF bias clear&#10;Liquidity sweep occurred&#10;FVG / zone present&#10;SL beyond invalidation&#10;No news risk">{{ (setup.checklist_text if setup else '')|e }}</textarea>
    </div>

    <div class="col-12 col-md-8">
        <label class="form-label">Tags</label>
        <input class="form-control" name="tags" value="{{ (setup.tags if setup else '')|e }}" placeholder="fvg, sweep, london, a+">
        <div class="form-text">Comma-separated. Useful for Strategy Lab + filtering later.</div>
    </div>
    <div class="col-12 col-md-4 d-flex align-items-end">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if setup is none or setup.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Active</label>
        </div>
    </div>
</div>
