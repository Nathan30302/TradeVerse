{% extends "base.html" %}
{% block title %}Session expired{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <h1 class="display-5 mb-3"><i class="fas fa-shield-alt text-warning"></i> Could not verify request</h1>
    <p class="text-muted mb-4">
        Your security token expired or was missing (often after sitting on a form or opening many tabs).
        Go back, refresh the page, and try again.
    </p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary me-2">Sign in again</a>
    <a href="javascript:history.back()" class="btn btn-outline-secondary">Go back</a>
</div>
{% endblock %}
