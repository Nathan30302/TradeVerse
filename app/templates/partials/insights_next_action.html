{# Single next-action strip for Insights pages — pass insights_next_action dict #}
{% if insights_next_action %}
{% set na = insights_next_action %}
<div class="card tv-surface mb-4" style="border-left: 4px solid #0ea5e9;">
    <div class="card-body py-3">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
            <div>
                <div class="small text-uppercase fw-semibold text-info mb-1">{{ na.eyebrow }}</div>
                <div class="fw-semibold">{{ na.title }}</div>
                <div class="small text-muted mb-0">{{ na.body }}</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-primary btn-sm" href="{{ na.cta_url }}">{{ na.cta_label }}</a>
                {% if na.secondary_url %}
                <a class="btn btn-outline-secondary btn-sm" href="{{ na.secondary_url }}">{{ na.secondary_label }}</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endif %}
