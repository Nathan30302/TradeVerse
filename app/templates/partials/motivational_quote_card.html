{# Premium auto-rotating motivational quote — requires motivational-quotes.css + .js #}
<div class="tv-quote-widget mb-4"
     data-tv-motivational-quotes
     data-quotes="{{ motivational_quotes_json | e }}"
     data-interval="{{ quote_rotation_ms | default(25000) }}"
     role="region"
     aria-label="Motivational trading insight"
     aria-live="polite">
    <div class="tv-quote-card">
        <div class="tv-quote-icon" aria-hidden="true">
            <i class="fas fa-lightbulb"></i>
        </div>
        <div class="tv-quote-body">
            <div class="tv-quote-text-wrap">
                <blockquote class="tv-quote-text">&ldquo;{{ initial_quote_text }}&rdquo;</blockquote>
            </div>
            <div class="tv-quote-lines" aria-hidden="true">
                <div class="tv-quote-line-static"></div>
                <div class="tv-quote-timer-track">
                    <span class="tv-quote-timer-fill"></span>
                </div>
            </div>
        </div>
    </div>
</div>
