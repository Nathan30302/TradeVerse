{% extends "base.html" %}

{% block title %}Contact - {{ app_name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 class="display-6 fw-bold mb-3">Contact</h1>
      <p class="text-muted mb-4">For support or feedback, email us at <a href="mailto:support@tradeversejournal.space">support@tradeversejournal.space</a>.</p>
      <div class="alert alert-info mb-0" role="alert">
        If you’re reporting a bug, include your username and the approximate time the error occurred.
      </div>
    </div>
  </div>
</div>
{% endblock %}
