<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>{% block title %}Console{% endblock %} · TradeVerse Owner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        body { background: linear-gradient(160deg, #0b1220 0%, #0f172a 45%, #020617 100%); min-height: 100vh; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
        .tv-owner-nav { background: rgba(15, 23, 42, 0.92); border-bottom: 1px solid rgba(148, 163, 184, 0.15); backdrop-filter: blur(8px); }
        .tv-stat-card { background: rgba(30, 41, 59, 0.55); border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 12px; padding: 1.15rem 1.25rem; height: 100%; }
        .tv-stat-card .label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 0.35rem; }
        .tv-stat-card .value { font-size: 1.85rem; font-weight: 700; color: #f8fafc; line-height: 1.15; }
        .tv-stat-card .hint { font-size: 0.8rem; color: #64748b; margin-top: 0.35rem; }
        .tv-panel { background: rgba(30, 41, 59, 0.45); border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 12px; overflow: hidden; }
        .tv-panel .card-header { background: rgba(15, 23, 42, 0.6); border-bottom: 1px solid rgba(148, 163, 184, 0.12); font-weight: 600; }
        .table-dark-custom { --bs-table-bg: transparent; color: #e2e8f0; font-size: 0.9rem; }
        .table-dark-custom thead { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .tv-owner-tabs .nav-link { color: #94a3b8; border-radius: 999px; padding: 0.45rem 1.1rem; font-weight: 600; font-size: 0.9rem; }
        .tv-owner-tabs .nav-link:hover { color: #e2e8f0; background: rgba(99, 102, 241, 0.12); }
        .tv-owner-tabs .nav-link.active { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg tv-owner-nav py-3">
        <div class="container-fluid px-3 px-md-4">
            <span class="navbar-brand text-white mb-0 fw-bold">
                <i class="fas fa-shield-alt text-info me-2"></i>TradeVerse <span class="text-secondary fw-normal">Owner console</span>
            </span>
            <div class="d-flex gap-2 flex-wrap justify-content-end">
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('dashboard.index') }}"><i class="fas fa-th-large me-1"></i>Open app</a>
                <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('auth.logout') }}"><i class="fas fa-sign-out-alt me-1"></i>Log out</a>
            </div>
        </div>
    </nav>
    <main class="container-fluid px-3 px-md-4 py-4 pb-5">
        {% include 'owner_admin/_console_nav.html' %}
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
